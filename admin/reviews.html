<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews | TerraQuest Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #2563eb;
            --bg-body: #f8fafc;
            --sidebar-width: 280px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: #0f172a;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .sidebar {
            width: var(--sidebar-width);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-link.active {
            background: rgba(37, 99, 235, 0.08);
            color: var(--primary);
        }

        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
                width: 280px !important;
                transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 50;
            }

            .sidebar.show {
                transform: translateX(0);
            }

            #main-content {
                margin-left: 0 !important;
            }

            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(15, 23, 42, 0.5);
                backdrop-filter: blur(4px);
                z-index: 45;
            }

            .show+.sidebar-overlay {
                display: block;
            }

            .sidebar-text {
                opacity: 1 !important;
                width: auto !important;
                pointer-events: auto !important;
                display: block !important;
            }
        }
    </style>
</head>

<body class="flex overflow-hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar fixed h-screen glass-panel z-50 flex flex-col border-r">
        <div class="p-6 flex items-center justify-between">
            <a href="../index.html" class="flex items-center gap-3 hover:opacity-80 transition">
                <div
                    class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                    <i class="fas fa-compass text-xl"></i>
                </div>
                <span class="text-xl font-bold text-gray-900 sidebar-text">TerraQuest</span>
            </a>
            <button id="close-sidebar" class="lg:hidden text-gray-500 hover:text-gray-900">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="dashboard.html"
                class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-gray-100 font-medium text-gray-500">
                <i class="fas fa-th-large w-5 text-center"></i>
                <span class="sidebar-text">Dashboard</span>
            </a>
            <a href="users.html"
                class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-gray-100 font-medium text-gray-500">
                <i class="fas fa-users w-5 text-center"></i>
                <span class="sidebar-text">Manage Users</span>
            </a>
            <a href="bookings.html"
                class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-gray-100 font-medium text-gray-500">
                <i class="fas fa-calendar-alt w-5 text-center"></i>
                <span class="sidebar-text">Manage Bookings</span>
            </a>
            <a href="destinations.html"
                class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-gray-100 font-medium text-gray-500">
                <i class="fas fa-map-marked-alt w-5 text-center"></i>
                <span class="sidebar-text">Destinations</span>
            </a>
            <a href="analytics.html"
                class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-gray-100 font-medium text-gray-500">
                <i class="fas fa-chart-line w-5 text-center"></i>
                <span class="sidebar-text">Analytics</span>
            </a>
            <a href="payments.html"
                class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-gray-100 font-medium text-gray-500">
                <i class="fas fa-credit-card w-5 text-center"></i>
                <span class="sidebar-text">Payments</span>
            </a>
            <a href="reviews.html" class="sidebar-link active flex items-center gap-4 px-4 py-3 rounded-xl font-medium">
                <i class="fas fa-star w-5 text-center"></i>
                <span class="sidebar-text">Reviews</span>
            </a>
            <div class="pt-6 mt-6 border-t border-gray-100">
                <a href="settings.html"
                    class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-gray-100 font-medium text-gray-500">
                    <i class="fas fa-cog w-5 text-center"></i>
                    <span class="sidebar-text">Settings</span>
                </a>
                <button onclick="Auth.logout()"
                    class="w-full sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-red-50 font-medium text-red-500">
                    <i class="fas fa-sign-out-alt w-5 text-center"></i>
                    <span class="sidebar-text">Logout</span>
                </button>
            </div>
        </nav>
    </aside>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <!-- Main Content -->
    <main id="main-content"
        class="flex-1 ml-[var(--sidebar-width)] overflow-y-auto h-screen transition-all duration-400">
        <header
            class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-gray-100 px-8 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button id="mobile-menu-toggle"
                    class="lg:hidden w-10 h-10 flex items-center justify-center bg-gray-50 rounded-xl text-gray-500"><i
                        class="fas fa-bars"></i></button>
                <h1 class="text-xl font-bold text-gray-900">Customer Reviews</h1>
            </div>
        </header>
        <div class="p-8 max-w-7xl mx-auto space-y-8">
            <div class="bg-white p-12 rounded-[2rem] border border-gray-100 text-center">
                <div
                    class="w-20 h-20 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-6">
                    <i class="fas fa-star"></i>
                </div>
                <h2 class="text-2xl font-bold mb-2 text-gray-900">Manage Customer Feedback</h2>
                <p class="text-gray-500 mb-8 max-w-md mx-auto">This section will allow you to approve, moderate, and
                    reply to all customer reviews across the platform.</p>
                <button class="px-8 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition">View
                    All Reviews</button>
            </div>
        </div>
    </main>
    <script src="../js/mock-api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/admin-dashboard.js"></script>
</body>

</html>
